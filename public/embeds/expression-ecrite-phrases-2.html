<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercice de formulation de phrases 2</title>
    <style>
      body {
        margin: 0;
        padding: 20px;
        background: #f9f9f9;
        color: #222;
        font-family: Arial, sans-serif;
      }

      .exercise-container {
        max-width: 920px;
        margin: 0 auto;
        padding: 20px;
        border: 1px solid #ddd;
        border-radius: 8px;
        background: #fff;
      }

      .phrase {
        margin-bottom: 20px;
      }

      .words,
      .answer {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .word,
      .answer span {
        padding: 8px 12px;
        border-radius: 5px;
        cursor: pointer;
        user-select: none;
      }

      .word {
        background: #007bff;
        color: white;
      }

      .word.used {
        background: #ddd;
        color: #777;
        cursor: not-allowed;
      }

      .answer {
        min-height: 34px;
        margin-top: 10px;
        padding: 6px;
        border: 1px dashed #bbb;
      }

      .answer span {
        background: #f0f0f0;
      }

      button {
        margin-top: 10px;
        padding: 10px 15px;
        border: 0;
        border-radius: 5px;
        background: #4caf50;
        color: white;
        cursor: pointer;
      }

      .correct {
        color: green;
        font-weight: bold;
      }

      .incorrect {
        color: red;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="exercise-container">
      <h1>Exercice de formulation de phrases 2</h1>
      <p>Remettez les mots dans le bon ordre pour former une phrase correcte en allemand.</p>
      <div id="exercises"></div>
    </div>

    <script>
      const phrases = [
        { german: 'Ich möchte heute Abend ins Kino gehen.', french: 'Je veux aller au cinéma ce soir.' },
        { german: 'Wir können morgen zusammen Fußball spielen.', french: 'Nous pouvons jouer au football ensemble demain.' },
        { german: 'Er hat gestern eine Pizza gegessen.', french: 'Il a mangé une pizza hier.' },
        { german: 'Sie ist letzte Woche nach Berlin gefahren.', french: 'Elle est allée à Berlin la semaine dernière.' },
        { german: 'Am Morgen habe ich die Zeitung gelesen.', french: "Le matin, j'ai lu le journal." },
        { german: 'Peter macht jeden Tag sein Zimmer sauber.', french: 'Peter nettoie sa chambre tous les jours.' },
        { german: 'Ich habe meine Freunde gestern angerufen.', french: "J'ai appelé mes amis hier." },
        { german: 'Heute früh bin ich sehr früh aufgestanden.', french: 'Ce matin, je me suis levé très tôt.' },
        { german: 'Wir möchten im Sommer ans Meer fahren.', french: 'Nous voulons aller à la mer cet été.' },
        { german: 'Er hat mir eine E-Mail geschrieben.', french: "Il m'a écrit un e-mail." },
      ];

      function shuffle(words) {
        return [...words].sort(() => Math.random() - 0.5);
      }

      function validate(index) {
        const userAnswer = Array.from(document.getElementById(`answer-${index}`).children)
          .map((span) => span.textContent)
          .join(' ') + '.';
        const feedback = document.getElementById(`feedback-${index}`);
        if (userAnswer === phrases[index].german) {
          feedback.textContent = 'Bonne réponse !';
          feedback.className = 'correct';
        } else {
          feedback.textContent = 'Faux ! Essayez encore.';
          feedback.className = 'incorrect';
        }
      }

      const container = document.getElementById('exercises');
      phrases.forEach((phrase, index) => {
        const div = document.createElement('div');
        div.className = 'phrase';
        div.innerHTML = `
          <p><strong>Phrase ${index + 1}:</strong> ${phrase.french}</p>
          <div class="words" id="words-${index}"></div>
          <div class="answer" id="answer-${index}"></div>
          <button type="button">Valider</button>
          <p id="feedback-${index}"></p>
        `;
        container.appendChild(div);
        const wordsContainer = div.querySelector('.words');
        shuffle(phrase.german.replace('.', '').split(' ')).forEach((word) => {
          const wordElement = document.createElement('span');
          wordElement.className = 'word';
          wordElement.textContent = word;
          wordElement.addEventListener('click', () => {
            if (wordElement.classList.contains('used')) return;
            const answerContainer = document.getElementById(`answer-${index}`);
            const answerWord = document.createElement('span');
            answerWord.textContent = word;
            answerWord.addEventListener('click', () => {
              answerWord.remove();
              wordElement.classList.remove('used');
            });
            answerContainer.appendChild(answerWord);
            wordElement.classList.add('used');
          });
          wordsContainer.appendChild(wordElement);
        });
        div.querySelector('button').addEventListener('click', () => validate(index));
      });
    </script>
  </body>
</html>

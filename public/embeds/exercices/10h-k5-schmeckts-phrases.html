<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phrases à bien connaître</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap');
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(145deg, rgba(255, 250, 229, 0.9), rgba(255, 250, 229, 0.9));
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .exercise-container {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        h1 {
            color: #FF8C00;
            text-align: center;
            margin-bottom: 20px;
        }
        .phrase {
            margin-bottom: 30px;
        }
        .phrase p {
            margin-bottom: 10px;
            font-size: 16px;
            color: #444;
        }
        .words {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .word {
            background: rgba(255, 165, 0, 0.4);
            color: black;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            user-select: none;
            border: 1px solid rgba(255, 165, 0, 0.7);
        }
        .word:hover {
            background: rgba(255, 165, 0, 0.7);
            transform: scale(1.1);
        }
        .word.used {
            background: #ddd;
            color: #999;
            cursor: not-allowed;
        }
        .answer {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
            min-height: 30px;
            border: 1px dashed #ccc;
            padding: 10px;
            background: rgba(240, 240, 240, 0.8);
            border-radius: 5px;
        }
        .btn-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }
        .btn-validate {
            padding: 10px 15px;
            background: #FFA500;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-validate:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .btn-validate:hover:not(:disabled) {
            background: #FF8C00;
        }
        .feedback {
            font-size: 14px;
            font-weight: bold;
            margin: 0;
        }
        .feedback.correct {
            color: green;
        }
        .feedback.incorrect {
            color: red;
        }
        .score {
            text-align: center;
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #444;
        }
    </style>
</head>
<body>
    <div class="exercise-container">
        <h1>Phrases à bien connaître</h1>
        <p>Remets les phrases dans le bon ordre en cliquant sur les mots. Tu as 3 tentatives par phrase.</p>

        <div id="exercises">
            <!-- Les phrases seront insérées ici dynamiquement -->
        </div>

        <div class="score" id="score-container" style="display: none;">
            <p>🏆Score final :</p>
            <p>🥇Réussies du premier coup : <span id="score-first">0</span></p>
            <p>🥈Réussies au deuxième coup : <span id="score-second">0</span></p>
            <p>🥉Réussies au troisième coup : <span id="score-third">0</span></p>
        </div>
    </div>

    <script>
        const phrases = [
            { german: ["Zum Frühstück esse ich oft Brot mit Marmelade."], french: "Au petit-déjeuner, je mange souvent du pain avec de la confiture." },
            { german: ["Ich trinke morgens immer eine Tasse Tee."], french: "Je bois toujours une tasse de thé le matin." },
            { german: ["Was isst du gern? – Ich esse gern Pizza und Pasta."], french: "Que manges-tu volontiers ? – J'aime manger de la pizza et des pâtes." },
            { german: ["Mein Lieblingsessen ist Spaghetti Bolognese."], french: "Mon plat préféré, ce sont les spaghettis bolognaises." },
            { german: ["Ich mag keine scharfen Speisen."], french: "Je n'aime pas les plats épicés." },
            { german: ["Kaffee schmeckt mir nicht so gut."], french: "Je n'aime pas tellement le café." },
            { german: ["In Deutschland isst man oft Brot zum Abendessen."], french: "En Allemagne, on mange souvent du pain pour le dîner." },
            { german: ["Ich esse lieber Obst als Schokolade, weil es gesünder ist."], french: "Je préfère manger des fruits plutôt que du chocolat, car c'est plus sain." },
            { german: ["Ich finde, dass Sushi sehr lecker ist."], french: "Je trouve que les sushis sont très bons." },
            { german: ["Was möchtest du bestellen? – Ich nehme einen Salat und ein Wasser."], french: "Que veux-tu commander ? – Je prends une salade et une eau." },
            { german: ["Welche Gerichte magst du aus der deutschen Küche?"], french: "Quels plats de la cuisine allemande aimes-tu ?" },
            { german: ["Zum Mittagessen hatte ich ein Sandwich und eine Suppe."], french: "Au déjeuner, j'ai mangé un sandwich et une soupe." },
            { german: ["Ich koche gerne, weil es Spaß macht."], french: "J'aime cuisiner parce que c'est amusant." },
            { german: ["Dieses Restaurant bietet viele vegetarische Gerichte an."], french: "Ce restaurant propose beaucoup de plats végétariens." },
            { german: ["Kann ich bitte das Rezept für diesen Kuchen haben?"], french: "Puis-je avoir la recette de ce gâteau, s'il vous plaît ?" },
            { german: ["Wir haben gestern Pizza selbst gemacht."], french: "Nous avons fait une pizza nous-mêmes hier." },
            { german: ["Wie oft kochst du zu Hause? – Fast jeden Tag."], french: "À quelle fréquence cuisines-tu chez toi ? – Presque tous les jours." },
            { german: ["Ich finde, dass Fast Food ungesund ist."], french: "Je trouve que la restauration rapide est malsaine." },
            { german: ["Schokolade macht glücklich!"], french: "Le chocolat rend heureux !" },
            { german: ["Zum Dessert esse ich am liebsten Eis oder Kuchen."], french: "En dessert, je préfère manger de la glace ou du gâteau." },
            { german: ["Kannst du die Zutaten für das Rezept aufschreiben?"], french: "Peux-tu écrire les ingrédients pour la recette ?" },
            { german: ["Welche Getränke mögen deine Freunde? – Sie trinken gern Cola und Saft."], french: "Quels boissons aiment tes amis ? – Ils aiment boire du coca et du jus." },
            { german: ["In der Schweiz isst man oft Rösti."], french: "En Suisse, on mange souvent des röstis." },
            { german: ["Wir haben einen Nudelsalat für das Picknick gemacht."], french: "Nous avons fait une salade de pâtes pour le pique-nique." },
            { german: ["Ich probiere gerne neue Gerichte aus anderen Ländern."], french: "J'aime essayer de nouveaux plats d'autres pays." },
            { german: ["Mein Bruder liebt es, Pfannkuchen zu machen."], french: "Mon frère adore faire des crêpes." },
            { german: ["Wie viel Salz braucht man für das Rezept?"], french: "Combien de sel faut-il pour la recette ?" },
            { german: ["Ich mag keine bitteren Speisen."], french: "Je n'aime pas les plats amers." },
            { german: ["Wir haben gestern zusammen gekocht, und es hat viel Spaß gemacht."], french: "Nous avons cuisiné ensemble hier, et c'était très amusant." },
            { german: ["Zum Frühstück gibt es manchmal Eier und Käse."], french: "Au petit-déjeuner, il y a parfois des œufs et du fromage." },
            
        ];

        const container = document.getElementById('exercises');
        const scoreContainer = document.getElementById('score-container');
        const scoreFirstElem = document.getElementById('score-first');
        const scoreSecondElem = document.getElementById('score-second');
        const scoreThirdElem = document.getElementById('score-third');

        let scoreFirst = 0, scoreSecond = 0, scoreThird = 0;

        phrases.forEach((phrase, index) => {
            const words = phrase.german[0].replace('.', '').split(' ').sort(() => Math.random() - 0.5);
            let lastAnswer = '';
            let attempts = 0;

            const div = document.createElement('div');
            div.classList.add('phrase');
            div.innerHTML = `
               <p><strong>${index + 1})</strong> ${phrase.french}</p>
                <div class="words" id="words-${index}">
                    ${words.map(word => `<span class="word">${word}</span>`).join('')}
                </div>
                <div class="answer" id="answer-${index}"></div>
                <div class="btn-container">
                    <button class="btn-validate" id="validate-${index}" disabled>Valider</button>
                    <p id="feedback-${index}" class="feedback"></p>
                </div>
            `;
            container.appendChild(div);

            const validateBtn = document.getElementById(`validate-${index}`);
            const answerContainer = document.getElementById(`answer-${index}`);
            const feedback = document.getElementById(`feedback-${index}`);

            document.querySelectorAll(`#words-${index} .word`).forEach(wordElement => {
                wordElement.addEventListener('click', () => {
                    if (!wordElement.classList.contains('used')) {
                        const wordSpan = document.createElement('span');
                        wordSpan.textContent = wordElement.textContent;
                        wordSpan.onclick = () => {
                            answerContainer.removeChild(wordSpan);
                            wordElement.classList.remove('used');
                            toggleValidateButton();
                        };
                        answerContainer.appendChild(wordSpan);
                        wordElement.classList.add('used');
                        toggleValidateButton();
                    }
                });
            });

            function toggleValidateButton() {
                const currentAnswer = Array.from(answerContainer.children).map(span => span.textContent).join(' ').trim();
                const isComplete = answerContainer.children.length === words.length;
                validateBtn.disabled = !isComplete || currentAnswer === lastAnswer;
            }

            validateBtn.addEventListener('click', () => {
                const userAnswer = Array.from(answerContainer.children).map(span => span.textContent).join(' ').trim();
                const correctAnswer = phrase.german[0].replace('.', '').trim();
                attempts++;
                lastAnswer = userAnswer;

                if (userAnswer === correctAnswer) {
                    feedback.textContent = "Bonne réponse !";
                    feedback.className = "feedback correct";
                    validateBtn.disabled = true;
                    document.querySelector(`#words-${index}`).classList.add('disabled');
                    scoreByAttempts(attempts);
                } else {
                    feedback.textContent = `Faux ! Tentative ${attempts}/3. Essayez encore.`;
                    feedback.className = "feedback incorrect";
                    if (attempts >= 3) {
                        feedback.textContent = `Faux ! Réponse correcte : "${phrase.german[0]}". Vous pouvez réessayer.`;
                        attempts = 0;
                    }
                }
                toggleValidateButton();
            });
        });

        function scoreByAttempts(attempts) {
            if (attempts === 1) scoreFirst++;
            else if (attempts === 2) scoreSecond++;
            else if (attempts === 3) scoreThird++;

            if (scoreFirst + scoreSecond + scoreThird === phrases.length) {
                showScore();
            }
        }

        function showScore() {
            scoreFirstElem.textContent = scoreFirst;
            scoreSecondElem.textContent = scoreSecond;
            scoreThirdElem.textContent = scoreThird;
            scoreContainer.style.display = 'block';
        }
    </script>
</body>
</html>

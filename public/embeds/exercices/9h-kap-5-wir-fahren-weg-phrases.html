<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phrases à bien connaître</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap');
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(145deg, rgba(255, 250, 229, 0.9), rgba(255, 250, 229, 0.9));
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .exercise-container {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        h1 {
            color: #FF8C00;
            text-align: center;
            margin-bottom: 20px;
        }
        .phrase {
            margin-bottom: 30px;
        }
        .phrase p {
            margin-bottom: 10px;
            font-size: 16px;
            color: #444;
        }
        .words {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .word {
            background: rgba(255, 165, 0, 0.4);
            color: black;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            user-select: none;
            border: 1px solid rgba(255, 165, 0, 0.7);
        }
        .word:hover {
            background: rgba(255, 165, 0, 0.7);
            transform: scale(1.1);
        }
        .word.used {
            background: #ddd;
            color: #999;
            cursor: not-allowed;
        }
        .answer {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
            min-height: 30px;
            border: 1px dashed #ccc;
            padding: 10px;
            background: rgba(240, 240, 240, 0.8);
            border-radius: 5px;
        }
        .btn-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }
        .btn-validate {
            padding: 10px 15px;
            background: #FFA500;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-validate:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .btn-validate:hover:not(:disabled) {
            background: #FF8C00;
        }
        .feedback {
            font-size: 14px;
            font-weight: bold;
            margin: 0;
        }
        .feedback.correct {
            color: green;
        }
        .feedback.incorrect {
            color: red;
        }
        .score {
            text-align: center;
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #444;
        }
    </style>
</head>
<body>
    <div class="exercise-container">
        <h1>Phrases à bien connaître</h1>
        <p>Remets les phrases dans le bon ordre en cliquant sur les mots. Tu as 3 tentatives par phrase.</p>

        <div id="exercises">
            <!-- Les phrases seront insérées ici dynamiquement -->
        </div>

        <div class="score" id="score-container" style="display: none;">
            <p>🏆Score final :</p>
            <p>🥇Réussies du premier coup : <span id="score-first">0</span></p>
            <p>🥈Réussies au deuxième coup : <span id="score-second">0</span></p>
            <p>🥉Réussies au troisième coup : <span id="score-third">0</span></p>
        </div>
    </div>

    <script>
        const phrases = [
            { german: ["Wohin fährst du in den Ferien?"], french: "Où pars-tu pendant les vacances ?" },
            { german: ["Ich fahre nach Berlin."], french: "Je vais à Berlin." },
            { german: ["Wir machen Urlaub in den Bergen."], french: "Nous passons des vacances à la montagne." },
            { german: ["Kommst du mit an den See?"], french: "Tu viens avec nous au lac ?" },
            { german: ["Wie lange bleibst du dort?"], french: "Combien de temps restes-tu là-bas ?" },
            { german: ["Ich bleibe eine Woche."], french: "Je reste une semaine." },
            { german: ["Mit wem fährst du in die Ferien?"], french: "Avec qui pars-tu en vacances ?" },
            { german: ["Ich fahre mit meiner Familie."], french: "Je pars avec ma famille." },
            { german: ["Wie reist du nach Hamburg?"], french: "Comment voyages-tu à Hambourg ?" },
            { german: ["Ich fahre mit dem Zug."], french: "Je vais en train." },
            { german: ["Das Flugzeug ist schneller als das Auto."], french: "L'avion est plus rapide que la voiture." },
            { german: ["Wir übernachten in einer Jugendherberge."], french: "Nous passons la nuit dans une auberge de jeunesse." },
            { german: ["Wo ist die Jugendherberge?"], french: "Où se trouve l'auberge de jeunesse ?" },
            { german: ["Die Jugendherberge ist im Stadtzentrum."], french: "L'auberge de jeunesse est dans le centre-ville." },
            { german: ["Gibt es ein Hotel in der Nähe?"], french: "Y a-t-il un hôtel à proximité ?" },
            { german: ["Ich möchte ein Einzelzimmer buchen."], french: "Je voudrais réserver une chambre individuelle." },
            { german: ["Was packst du in deinen Koffer?"], french: "Que mets-tu dans ta valise ?" },
            { german: ["Ich packe meine Kleidung und meine Zahnbürste."], french: "Je mets mes vêtements et ma brosse à dents." },
            { german: ["Hast du den Reisepass dabei?"], french: "As-tu ton passeport avec toi ?" },
            { german: ["Wir müssen die Fahrkarten kaufen."], french: "Nous devons acheter les billets." },
            { german: ["Was kostet die Fahrt nach München?"], french: "Combien coûte le trajet pour Munich ?" },
            { german: ["Welche Sehenswürdigkeiten gibt es in Hamburg?"], french: "Quels monuments y a-t-il à Hambourg ?" },
            { german: ["Wir besuchen das Rathaus und den Hafen."], french: "Nous visitons la mairie et le port." },
            { german: ["Kannst du mir den Weg zur U-Bahn-Station zeigen?"], french: "Peux-tu me montrer le chemin vers la station de métro ?" },
            { german: ["Der Bahnhof ist in der Nähe vom Hotel."], french: "La gare est près de l'hôtel." },
            { german: ["Was machst du im Urlaub?"], french: "Que fais-tu pendant les vacances ?" },
            { german: ["Ich mache viele Fotos und entspanne mich."], french: "Je prends beaucoup de photos et je me détends." },
            { german: ["Wir gehen oft schwimmen."], french: "Nous allons souvent nager." },
            { german: ["Möchtest du eine Postkarte schreiben?"], french: "Veux-tu écrire une carte postale ?" },
            { german: ["Hallo aus Berlin! Hier ist es super!"], french: "Bonjour de Berlin ! Ici, c'est génial !" },
            { german: ["Ich finde diese Stadt sehr interessant."], french: "Je trouve cette ville très intéressante." },
            { german: ["Wann fährst du zurück?"], french: "Quand rentres-tu ?" },
            { german: ["Wir fahren nächsten Montag zurück."], french: "Nous rentrons lundi prochain." },
            { german: ["Die Reise war toll, aber ich bin müde."], french: "Le voyage était génial, mais je suis fatigué(e)." },
            
        ];

        const container = document.getElementById('exercises');
        const scoreContainer = document.getElementById('score-container');
        const scoreFirstElem = document.getElementById('score-first');
        const scoreSecondElem = document.getElementById('score-second');
        const scoreThirdElem = document.getElementById('score-third');

        let scoreFirst = 0, scoreSecond = 0, scoreThird = 0;

        phrases.forEach((phrase, index) => {
            const words = phrase.german[0].replace('.', '').split(' ').sort(() => Math.random() - 0.5);
            let lastAnswer = '';
            let attempts = 0;

            const div = document.createElement('div');
            div.classList.add('phrase');
            div.innerHTML = `
               <p><strong>${index + 1})</strong> ${phrase.french}</p>
                <div class="words" id="words-${index}">
                    ${words.map(word => `<span class="word">${word}</span>`).join('')}
                </div>
                <div class="answer" id="answer-${index}"></div>
                <div class="btn-container">
                    <button class="btn-validate" id="validate-${index}" disabled>Valider</button>
                    <p id="feedback-${index}" class="feedback"></p>
                </div>
            `;
            container.appendChild(div);

            const validateBtn = document.getElementById(`validate-${index}`);
            const answerContainer = document.getElementById(`answer-${index}`);
            const feedback = document.getElementById(`feedback-${index}`);

            document.querySelectorAll(`#words-${index} .word`).forEach(wordElement => {
                wordElement.addEventListener('click', () => {
                    if (!wordElement.classList.contains('used')) {
                        const wordSpan = document.createElement('span');
                        wordSpan.textContent = wordElement.textContent;
                        wordSpan.onclick = () => {
                            answerContainer.removeChild(wordSpan);
                            wordElement.classList.remove('used');
                            toggleValidateButton();
                        };
                        answerContainer.appendChild(wordSpan);
                        wordElement.classList.add('used');
                        toggleValidateButton();
                    }
                });
            });

            function toggleValidateButton() {
                const currentAnswer = Array.from(answerContainer.children).map(span => span.textContent).join(' ').trim();
                const isComplete = answerContainer.children.length === words.length;
                validateBtn.disabled = !isComplete || currentAnswer === lastAnswer;
            }

            validateBtn.addEventListener('click', () => {
                const userAnswer = Array.from(answerContainer.children).map(span => span.textContent).join(' ').trim();
                const correctAnswer = phrase.german[0].replace('.', '').trim();
                attempts++;
                lastAnswer = userAnswer;

                if (userAnswer === correctAnswer) {
                    feedback.textContent = "Bonne réponse !";
                    feedback.className = "feedback correct";
                    validateBtn.disabled = true;
                    document.querySelector(`#words-${index}`).classList.add('disabled');
                    scoreByAttempts(attempts);
                } else {
                    feedback.textContent = `Faux ! Tentative ${attempts}/3. Essayez encore.`;
                    feedback.className = "feedback incorrect";
                    if (attempts >= 3) {
                        feedback.textContent = `Faux ! Réponse correcte : "${phrase.german[0]}". Vous pouvez réessayer.`;
                        attempts = 0;
                    }
                }
                toggleValidateButton();
            });
        });

        function scoreByAttempts(attempts) {
            if (attempts === 1) scoreFirst++;
            else if (attempts === 2) scoreSecond++;
            else if (attempts === 3) scoreThird++;

            if (scoreFirst + scoreSecond + scoreThird === phrases.length) {
                showScore();
            }
        }

        function showScore() {
            scoreFirstElem.textContent = scoreFirst;
            scoreSecondElem.textContent = scoreSecond;
            scoreThirdElem.textContent = scoreThird;
            scoreContainer.style.display = 'block';
        }
    </script>
</body>
</html>

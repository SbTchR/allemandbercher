<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phrases à bien connaître</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap');
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(145deg, rgba(255, 250, 229, 0.9), rgba(255, 250, 229, 0.9));
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .exercise-container {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        h1 {
            color: #FF8C00;
            text-align: center;
            margin-bottom: 20px;
        }
        .phrase {
            margin-bottom: 30px;
        }
        .phrase p {
            margin-bottom: 10px;
            font-size: 16px;
            color: #444;
        }
        .words {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .word {
            background: rgba(255, 165, 0, 0.4);
            color: black;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            user-select: none;
            border: 1px solid rgba(255, 165, 0, 0.7);
        }
        .word:hover {
            background: rgba(255, 165, 0, 0.7);
            transform: scale(1.1);
        }
        .word.used {
            background: #ddd;
            color: #999;
            cursor: not-allowed;
        }
        .answer {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
            min-height: 30px;
            border: 1px dashed #ccc;
            padding: 10px;
            background: rgba(240, 240, 240, 0.8);
            border-radius: 5px;
        }
        .btn-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }
        .btn-validate {
            padding: 10px 15px;
            background: #FFA500;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-validate:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .btn-validate:hover:not(:disabled) {
            background: #FF8C00;
        }
        .feedback {
            font-size: 14px;
            font-weight: bold;
            margin: 0;
        }
        .feedback.correct {
            color: green;
        }
        .feedback.incorrect {
            color: red;
        }
        .score {
            text-align: center;
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #444;
        }
    </style>
</head>
<body>
    <div class="exercise-container">
        <h1>Phrases à bien connaître</h1>
        <p>Remets les phrases dans le bon ordre en cliquant sur les mots. Tu as 3 tentatives par phrase.</p>

        <div id="exercises">
            <!-- Les phrases seront insérées ici dynamiquement -->
        </div>

        <div class="score" id="score-container" style="display: none;">
            <p>🏆Score final :</p>
            <p>🥇Réussies du premier coup : <span id="score-first">0</span></p>
            <p>🥈Réussies au deuxième coup : <span id="score-second">0</span></p>
            <p>🥉Réussies au troisième coup : <span id="score-third">0</span></p>
        </div>
    </div>

    <script>
        const phrases = [
            { german: ["Wie geht es dir? – Mir geht es gut, danke."], french: "Comment ça va ? – Je vais bien, merci." },
            { german: ["Ich bin heute sehr glücklich, weil die Sonne scheint."], french: "Aujourd'hui, je suis très heureux parce qu'il y a du soleil." },
            { german: ["Warum bist du traurig? – Ich habe meinen Schlüssel verloren."], french: "Pourquoi es-tu triste ? – J'ai perdu mes clés." },
            { german: ["Ich bin wütend, weil mein Freund nicht gekommen ist."], french: "Je suis en colère parce que mon ami n'est pas venu." },
            { german: ["Wenn ich müde bin, höre ich Musik."], french: "Quand je suis fatigué, j'écoute de la musique." },
            { german: ["Es tut mir leid, dass ich zu spät bin."], french: "Je suis désolé d'être en retard." },
            { german: ["Was ist los mit dir? – Ich habe einen schlechten Tag."], french: "Qu'est-ce qui ne va pas ? – J'ai passé une mauvaise journée." },
            { german: ["Du solltest dich mehr entspannen."], french: "Tu devrais te détendre davantage." },
            { german: ["Ich ärgere mich, wenn mein Bruder mein Zimmer betritt."], french: "Je m'énerve quand mon frère entre dans ma chambre." },
            { german: ["Ich streite mich manchmal mit meiner Schwester."], french: "Je me dispute parfois avec ma sœur." },
            { german: ["Sei vorsichtig, das Glas ist zerbrechlich!"], french: "Fais attention, le verre est fragile !" },
            { german: ["Ich entschuldige mich für mein Verhalten."], french: "Je m'excuse pour mon comportement." },
            { german: ["Ich bin aufgeregt, weil wir morgen eine Klassenreise machen."], french: "Je suis excité car nous partons en voyage scolaire demain." },
            { german: ["Meine Freundin ist enttäuscht, weil sie eine schlechte Note bekommen hat."], french: "Mon amie est déçue car elle a eu une mauvaise note." },
            { german: ["Ich finde es toll, dass du so hilfsbereit bist."], french: "Je trouve super que tu sois si serviable." },
            { german: ["Wenn ich nervös bin, atme ich tief ein und aus."], french: "Quand je suis nerveux, je respire profondément." },
            { german: ["Wie fühlst du dich heute?"], french: "Comment te sens-tu aujourd'hui ?" },
            { german: ["Ich bin stolz auf dich, weil du so fleißig warst."], french: "Je suis fier de toi parce que tu as été si travailleur." },
            { german: ["Reg dich nicht auf, alles wird gut!"], french: "Ne t'énerve pas, tout ira bien !" },
            { german: ["Ich bin entspannt, wenn ich ein Buch lese."], french: "Je suis détendu quand je lis un livre." },
            { german: ["Mein Vater ist immer ruhig, auch wenn es stressig ist."], french: "Mon père est toujours calme, même en période de stress." },
            { german: ["Ich freue mich auf die Ferien."], french: "J'ai hâte d'être en vacances." },
            { german: ["Ich habe Angst vor Prüfungen."], french: "J'ai peur des examens." },
            { german: ["Manchmal fühle ich mich einsam, wenn ich alleine zu Hause bin."], french: "Parfois, je me sens seul quand je suis à la maison." },
            { german: ["Wenn du schlecht gelaunt bist, geh spazieren."], french: "Si tu es de mauvaise humeur, va te promener." },
            { german: ["Ich finde, dass Sport hilft, wenn man wütend ist."], french: "Je trouve que le sport aide quand on est en colère." },
            { german: ["Warum streitest du dich so oft mit deinem Bruder?"], french: "Pourquoi te disputes-tu si souvent avec ton frère ?" },
            { german: ["Ich bin zufrieden, weil ich meine Hausaufgaben fertig habe."], french: "Je suis content parce que j'ai terminé mes devoirs." },
            { german: ["Meine Mutter ist gestresst, weil sie viel Arbeit hat."], french: "Ma mère est stressée parce qu'elle a beaucoup de travail." },
            { german: ["Du solltest dich entschuldigen, wenn du jemanden verletzt hast."], french: "Tu devrais t'excuser si tu as blessé quelqu'un." },
            
        ];

        const container = document.getElementById('exercises');
        const scoreContainer = document.getElementById('score-container');
        const scoreFirstElem = document.getElementById('score-first');
        const scoreSecondElem = document.getElementById('score-second');
        const scoreThirdElem = document.getElementById('score-third');

        let scoreFirst = 0, scoreSecond = 0, scoreThird = 0;

        phrases.forEach((phrase, index) => {
            const words = phrase.german[0].replace('.', '').split(' ').sort(() => Math.random() - 0.5);
            let lastAnswer = '';
            let attempts = 0;

            const div = document.createElement('div');
            div.classList.add('phrase');
            div.innerHTML = `
               <p><strong>${index + 1})</strong> ${phrase.french}</p>
                <div class="words" id="words-${index}">
                    ${words.map(word => `<span class="word">${word}</span>`).join('')}
                </div>
                <div class="answer" id="answer-${index}"></div>
                <div class="btn-container">
                    <button class="btn-validate" id="validate-${index}" disabled>Valider</button>
                    <p id="feedback-${index}" class="feedback"></p>
                </div>
            `;
            container.appendChild(div);

            const validateBtn = document.getElementById(`validate-${index}`);
            const answerContainer = document.getElementById(`answer-${index}`);
            const feedback = document.getElementById(`feedback-${index}`);

            document.querySelectorAll(`#words-${index} .word`).forEach(wordElement => {
                wordElement.addEventListener('click', () => {
                    if (!wordElement.classList.contains('used')) {
                        const wordSpan = document.createElement('span');
                        wordSpan.textContent = wordElement.textContent;
                        wordSpan.onclick = () => {
                            answerContainer.removeChild(wordSpan);
                            wordElement.classList.remove('used');
                            toggleValidateButton();
                        };
                        answerContainer.appendChild(wordSpan);
                        wordElement.classList.add('used');
                        toggleValidateButton();
                    }
                });
            });

            function toggleValidateButton() {
                const currentAnswer = Array.from(answerContainer.children).map(span => span.textContent).join(' ').trim();
                const isComplete = answerContainer.children.length === words.length;
                validateBtn.disabled = !isComplete || currentAnswer === lastAnswer;
            }

            validateBtn.addEventListener('click', () => {
                const userAnswer = Array.from(answerContainer.children).map(span => span.textContent).join(' ').trim();
                const correctAnswer = phrase.german[0].replace('.', '').trim();
                attempts++;
                lastAnswer = userAnswer;

                if (userAnswer === correctAnswer) {
                    feedback.textContent = "Bonne réponse !";
                    feedback.className = "feedback correct";
                    validateBtn.disabled = true;
                    document.querySelector(`#words-${index}`).classList.add('disabled');
                    scoreByAttempts(attempts);
                } else {
                    feedback.textContent = `Faux ! Tentative ${attempts}/3. Essayez encore.`;
                    feedback.className = "feedback incorrect";
                    if (attempts >= 3) {
                        feedback.textContent = `Faux ! Réponse correcte : "${phrase.german[0]}". Vous pouvez réessayer.`;
                        attempts = 0;
                    }
                }
                toggleValidateButton();
            });
        });

        function scoreByAttempts(attempts) {
            if (attempts === 1) scoreFirst++;
            else if (attempts === 2) scoreSecond++;
            else if (attempts === 3) scoreThird++;

            if (scoreFirst + scoreSecond + scoreThird === phrases.length) {
                showScore();
            }
        }

        function showScore() {
            scoreFirstElem.textContent = scoreFirst;
            scoreSecondElem.textContent = scoreSecond;
            scoreThirdElem.textContent = scoreThird;
            scoreContainer.style.display = 'block';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phrases à bien connaître</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap');
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(145deg, rgba(255, 250, 229, 0.9), rgba(255, 250, 229, 0.9));
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .exercise-container {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        h1 {
            color: #FF8C00;
            text-align: center;
            margin-bottom: 20px;
        }
        .phrase {
            margin-bottom: 30px;
        }
        .phrase p {
            margin-bottom: 10px;
            font-size: 16px;
            color: #444;
        }
        .words {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .word {
            background: rgba(255, 165, 0, 0.4);
            color: black;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            user-select: none;
            border: 1px solid rgba(255, 165, 0, 0.7);
        }
        .word:hover {
            background: rgba(255, 165, 0, 0.7);
            transform: scale(1.1);
        }
        .word.used {
            background: #ddd;
            color: #999;
            cursor: not-allowed;
        }
        .answer {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
            min-height: 30px;
            border: 1px dashed #ccc;
            padding: 10px;
            background: rgba(240, 240, 240, 0.8);
            border-radius: 5px;
        }
        .btn-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }
        .btn-validate {
            padding: 10px 15px;
            background: #FFA500;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-validate:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .btn-validate:hover:not(:disabled) {
            background: #FF8C00;
        }
        .feedback {
            font-size: 14px;
            font-weight: bold;
            margin: 0;
        }
        .feedback.correct {
            color: green;
        }
        .feedback.incorrect {
            color: red;
        }
        .score {
            text-align: center;
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #444;
        }
    </style>
</head>
<body>
    <div class="exercise-container">
        <h1>Phrases à bien connaître</h1>
        <p>Remets les phrases dans le bon ordre en cliquant sur les mots. Tu as 3 tentatives par phrase.</p>

        <div id="exercises">
            <!-- Les phrases seront insérées ici dynamiquement -->
        </div>

        <div class="score" id="score-container" style="display: none;">
            <p>🏆Score final :</p>
            <p>🥇Réussies du premier coup : <span id="score-first">0</span></p>
            <p>🥈Réussies au deuxième coup : <span id="score-second">0</span></p>
            <p>🥉Réussies au troisième coup : <span id="score-third">0</span></p>
        </div>
    </div>

    <script>
        const phrases = [
            { german: ["Meine Familie ist nicht sehr groß."], french: "Ma famille n'est pas très grande." },
            { german: ["Ich habe zwei Geschwister: einen Bruder und eine Schwester."], french: "J'ai deux frères et sœurs : un frère et une sœur." },
            { german: ["Mein Vater ist Lehrer und meine Mutter arbeitet im Krankenhaus."], french: "Mon père est professeur et ma mère travaille à l'hôpital." },
            { german: ["Meine Großeltern wohnen in Berlin."], french: "Mes grands-parents habitent à Berlin." },
            { german: ["Hast du Cousins oder Cousinen?"], french: "As-tu des cousins ou des cousines ?" },
            { german: ["Ja, ich habe drei Cousins, aber keine Cousine."], french: "Oui, j'ai trois cousins, mais pas de cousine." },
            { german: ["Mein Onkel ist sehr lustig und meine Tante ist freundlich."], french: "Mon oncle est très drôle et ma tante est gentille." },
            { german: ["Wie alt ist dein Bruder?"], french: "Quel âge a ton frère ?" },
            { german: ["Meine Schwester ist 12 Jahre alt und sie mag Tiere."], french: "Ma sœur a 12 ans et elle aime les animaux." },
            { german: ["Wir essen oft zusammen am Wochenende."], french: "Nous mangeons souvent ensemble le week-end." },
            { german: ["Wo wohnt deine Familie?"], french: "Où habite ta famille ?" },
            { german: ["Wir wohnen in einem großen Haus mit Garten."], french: "Nous habitons dans une grande maison avec un jardin." },
            { german: ["Mein Zimmer ist im ersten Stock."], french: "Ma chambre est au premier étage." },
            { german: ["Unsere Wohnung hat drei Schlafzimmer und ein Wohnzimmer."], french: "Notre appartement a trois chambres et un salon." },
            { german: ["Im Wohnzimmer gibt es ein großes Sofa und einen Fernseher."], french: "Dans le salon, il y a un grand canapé et une télévision." },
            { german: ["Meine Mutter kocht gerne in der Küche."], french: "Ma mère aime cuisiner dans la cuisine." },
            { german: ["Wer macht die Hausarbeit in deiner Familie?"], french: "Qui fait le ménage dans ta famille ?" },
            { german: ["Mein Vater putzt oft das Badezimmer."], french: "Mon père nettoie souvent la salle de bain." },
            { german: ["Ich helfe beim Aufräumen meines Zimmers."], french: "J'aide à ranger ma chambre." },
            { german: ["Meine Katze schläft immer auf meinem Bett."], french: "Mon chat dort toujours sur mon lit." },
            { german: ["Beschreib deinen Vater!"], french: "Décris ton père !" },
            { german: ["Mein Vater ist groß, hat braune Haare und trägt eine Brille."], french: "Mon père est grand, a les cheveux bruns et porte des lunettes." },
            { german: ["Meine Mutter ist klein und sehr sportlich."], french: "Ma mère est petite et très sportive." },
            { german: ["Wir machen oft einen Spaziergang im Park."], french: "Nous faisons souvent une promenade dans le parc." },
            { german: ["Ich mag meine Familie, weil sie sehr nett ist."], french: "J'aime ma famille parce qu'elle est très gentille." },
            { german: ["Wann besuchst du deine Großeltern?"], french: "Quand rends-tu visite à tes grands-parents ?" },
            { german: ["Wir besuchen sie jedes Jahr zu Weihnachten."], french: "Nous leur rendons visite chaque année à Noël." },
            { german: ["Meine Cousine spielt Klavier und ich spiele Gitarre."], french: "Ma cousine joue du piano et moi, je joue de la guitare." },
            { german: ["Wie viele Personen gibt es in deiner Familie?"], french: "Combien de personnes y a-t-il dans ta famille ?" },
            { german: ["Es gibt fünf Personen in meiner Familie."], french: "Il y a cinq personnes dans ma famille." },
            { german: ["Mein Bruder ist jünger als ich, aber sehr intelligent."], french: "Mon frère est plus jeune que moi, mais très intelligent." },
            { german: ["Meine Eltern sprechen Deutsch und Französisch."], french: "Mes parents parlent allemand et français." },
            
        ];

        const container = document.getElementById('exercises');
        const scoreContainer = document.getElementById('score-container');
        const scoreFirstElem = document.getElementById('score-first');
        const scoreSecondElem = document.getElementById('score-second');
        const scoreThirdElem = document.getElementById('score-third');

        let scoreFirst = 0, scoreSecond = 0, scoreThird = 0;

        phrases.forEach((phrase, index) => {
            const words = phrase.german[0].replace('.', '').split(' ').sort(() => Math.random() - 0.5);
            let lastAnswer = '';
            let attempts = 0;

            const div = document.createElement('div');
            div.classList.add('phrase');
            div.innerHTML = `
               <p><strong>${index + 1})</strong> ${phrase.french}</p>
                <div class="words" id="words-${index}">
                    ${words.map(word => `<span class="word">${word}</span>`).join('')}
                </div>
                <div class="answer" id="answer-${index}"></div>
                <div class="btn-container">
                    <button class="btn-validate" id="validate-${index}" disabled>Valider</button>
                    <p id="feedback-${index}" class="feedback"></p>
                </div>
            `;
            container.appendChild(div);

            const validateBtn = document.getElementById(`validate-${index}`);
            const answerContainer = document.getElementById(`answer-${index}`);
            const feedback = document.getElementById(`feedback-${index}`);

            document.querySelectorAll(`#words-${index} .word`).forEach(wordElement => {
                wordElement.addEventListener('click', () => {
                    if (!wordElement.classList.contains('used')) {
                        const wordSpan = document.createElement('span');
                        wordSpan.textContent = wordElement.textContent;
                        wordSpan.onclick = () => {
                            answerContainer.removeChild(wordSpan);
                            wordElement.classList.remove('used');
                            toggleValidateButton();
                        };
                        answerContainer.appendChild(wordSpan);
                        wordElement.classList.add('used');
                        toggleValidateButton();
                    }
                });
            });

            function toggleValidateButton() {
                const currentAnswer = Array.from(answerContainer.children).map(span => span.textContent).join(' ').trim();
                const isComplete = answerContainer.children.length === words.length;
                validateBtn.disabled = !isComplete || currentAnswer === lastAnswer;
            }

            validateBtn.addEventListener('click', () => {
                const userAnswer = Array.from(answerContainer.children).map(span => span.textContent).join(' ').trim();
                const correctAnswer = phrase.german[0].replace('.', '').trim();
                attempts++;
                lastAnswer = userAnswer;

                if (userAnswer === correctAnswer) {
                    feedback.textContent = "Bonne réponse !";
                    feedback.className = "feedback correct";
                    validateBtn.disabled = true;
                    document.querySelector(`#words-${index}`).classList.add('disabled');
                    scoreByAttempts(attempts);
                } else {
                    feedback.textContent = `Faux ! Tentative ${attempts}/3. Essayez encore.`;
                    feedback.className = "feedback incorrect";
                    if (attempts >= 3) {
                        feedback.textContent = `Faux ! Réponse correcte : "${phrase.german[0]}". Vous pouvez réessayer.`;
                        attempts = 0;
                    }
                }
                toggleValidateButton();
            });
        });

        function scoreByAttempts(attempts) {
            if (attempts === 1) scoreFirst++;
            else if (attempts === 2) scoreSecond++;
            else if (attempts === 3) scoreThird++;

            if (scoreFirst + scoreSecond + scoreThird === phrases.length) {
                showScore();
            }
        }

        function showScore() {
            scoreFirstElem.textContent = scoreFirst;
            scoreSecondElem.textContent = scoreSecond;
            scoreThirdElem.textContent = scoreThird;
            scoreContainer.style.display = 'block';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phrases à bien connaître</title>
    <style>
        :root {
            color-scheme: light;
            --ink: #0f1a31;
            --text: #1c2842;
            --muted: #53617f;
            --accent: #d90429;
            --accent-2: #ffc928;
            --border: rgba(31, 42, 68, 0.12);
            --panel: rgba(255, 255, 255, 0.74);
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            padding: 0;
            color: var(--text);
            font-family:
                "Trebuchet MS", "Segoe UI Rounded", "Avenir Next", "Nunito", ui-sans-serif, system-ui, -apple-system,
                BlinkMacSystemFont, sans-serif;
            background: transparent;
        }

        .exercise-container {
            width: 100%;
            padding: 4px;
        }

        h1 {
            display: none;
        }

        .exercise-container > p {
            margin: 0 0 22px;
            color: var(--muted);
            font-size: 1rem;
            line-height: 1.45;
        }

        .phrase {
            position: relative;
            margin-bottom: 18px;
            padding: 18px;
            border: 2px solid rgba(15, 26, 49, 0.1);
            border-radius: 16px;
            background:
                linear-gradient(135deg, rgba(255, 201, 40, 0.08), transparent 34%),
                rgba(255, 255, 255, 0.72);
            box-shadow: 0 7px 0 rgba(15, 26, 49, 0.06);
        }

        .phrase p {
            margin: 0 0 12px;
            color: var(--text);
            font-size: 1rem;
            line-height: 1.35;
        }

        .phrase p strong {
            color: var(--link, #b00020);
        }

        .words,
        .answer {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .word,
        .answer span {
            display: inline-flex;
            min-height: 36px;
            align-items: center;
            border: 2px solid rgba(217, 4, 41, 0.18);
            border-radius: 12px;
            background: linear-gradient(180deg, #ffffff, rgba(255, 201, 40, 0.24));
            color: var(--ink);
            padding: 6px 11px;
            font-size: 0.96rem;
            font-weight: 850;
            line-height: 1;
            box-shadow: 0 4px 0 rgba(15, 26, 49, 0.07);
            user-select: none;
        }

        .word {
            cursor: pointer;
            transition:
                border-color 160ms ease,
                box-shadow 160ms ease,
                transform 160ms ease,
                background 160ms ease;
        }

        .word:hover {
            border-color: rgba(217, 4, 41, 0.46);
            background: linear-gradient(180deg, #ffffff, rgba(255, 201, 40, 0.38));
            box-shadow: 0 6px 0 rgba(15, 26, 49, 0.08);
            transform: translateY(-2px);
        }

        .word.used {
            border-color: rgba(31, 42, 68, 0.08);
            background: rgba(242, 246, 255, 0.74);
            color: rgba(83, 97, 127, 0.7);
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .answer {
            min-height: 52px;
            margin-top: 12px;
            padding: 10px;
            border: 2px dashed rgba(31, 42, 68, 0.16);
            border-radius: 14px;
            background: rgba(246, 249, 255, 0.74);
        }

        .answer:empty::before {
            color: rgba(83, 97, 127, 0.72);
            content: "Construis ta phrase ici...";
            font-size: 0.92rem;
            font-weight: 800;
        }

        .answer span {
            cursor: pointer;
        }

        .btn-container {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            margin-top: 12px;
        }

        .btn-validate {
            min-height: 38px;
            border: 2px solid rgba(217, 4, 41, 0.22);
            border-radius: 12px;
            background: linear-gradient(180deg, #ffffff, rgba(255, 201, 40, 0.28));
            color: var(--accent);
            padding: 7px 13px;
            cursor: pointer;
            font: inherit;
            font-size: 0.9rem;
            font-weight: 950;
            box-shadow: 0 5px 0 rgba(15, 26, 49, 0.07);
            transition:
                border-color 160ms ease,
                box-shadow 160ms ease,
                transform 160ms ease,
                background 160ms ease;
        }

        .btn-validate:hover:not(:disabled) {
            border-color: rgba(217, 4, 41, 0.52);
            background: linear-gradient(180deg, #ffffff, rgba(255, 201, 40, 0.42));
            box-shadow: 0 7px 0 rgba(15, 26, 49, 0.08);
            transform: translateY(-2px);
        }

        .btn-validate:disabled {
            border-color: rgba(31, 42, 68, 0.08);
            background: rgba(242, 246, 255, 0.8);
            color: rgba(83, 97, 127, 0.68);
            cursor: not-allowed;
            box-shadow: none;
        }

        .feedback {
            margin: 0;
            font-size: 0.92rem;
            font-weight: 900;
        }

        .feedback.correct {
            color: #18794e;
        }

        .feedback.incorrect {
            color: var(--accent);
        }

        .score {
            display: grid;
            gap: 6px;
            margin-top: 22px;
            padding: 18px;
            border: 2px solid rgba(255, 201, 40, 0.46);
            border-radius: 16px;
            background: rgba(255, 248, 225, 0.86);
            color: var(--ink);
            font-size: 1rem;
            font-weight: 850;
        }

        .score p {
            margin: 0;
        }

        @media (max-width: 620px) {
            .phrase {
                padding: 14px;
            }

            .word,
            .answer span {
                min-height: 34px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="exercise-container">
        <h1>Phrases à bien connaître</h1>
        <p>Remets les phrases dans le bon ordre en cliquant sur les mots. Tu as 3 tentatives par phrase.</p>

        <div id="exercises">
            <!-- Les phrases seront insérées ici dynamiquement -->
        </div>

        <div class="score" id="score-container" style="display: none;">
            <p>Score final :</p>
            <p>Réussies du premier coup : <span id="score-first">0</span></p>
            <p>Réussies au deuxième coup : <span id="score-second">0</span></p>
            <p>Réussies au troisième coup : <span id="score-third">0</span></p>
        </div>
    </div>

    <script>
        const phrases = [
            { german: ["Ich heiße Anna."], french: "Je m'appelle Anna." },
            { german: ["Ich bin 14 Jahre alt."], french: "J'ai 14 ans." },
            { german: ["Ich wohne in Genf."], french: "J'habite à Genève." },
            { german: ["Woher kommst du? Ich komme aus Zürich."], french: "D'où viens-tu ? Je viens de Zurich." },
            { german: ["Ich spreche Deutsch und Französisch."], french: "Je parle allemand et français." },
            { german: ["Hast du Geschwister? Ja, ich habe eine Schwester."], french: "As-tu des frères et sœurs ? Oui, j'ai une sœur." },
            { german: ["Hast du ein Haustier? Nein, ich habe keine Haustiere."], french: "As-tu un animal domestique ? Non, je n'ai pas d'animaux." },
            { german: ["Was ist dein Hobby?"], french: "Quel est ton passe-temps ?" },
            { german: ["Ich spiele Fußball und höre Musik."], french: "Je joue au football et j'écoute de la musique." },
            { german: ["Was machst du in deiner Freizeit?"], french: "Que fais-tu pendant ton temps libre ?" },
            { german: ["Ich treffe oft Freunde am Wochenende."], french: "Je vois souvent mes amis le week-end." },
            { german: ["Mein Lieblingshobby ist schwimmen."], french: "Mon passe-temps préféré est la natation." },
            { german: ["Meine Schule heißt Collège du Lac."], french: "Mon école s'appelle Collège du Lac." },
            { german: ["Mein Lieblingsfach ist Geschichte."], french: "Ma matière préférée est l'histoire." },
            { german: ["Ich habe Deutsch am Montag und Freitag."], french: "J'ai allemand le lundi et le vendredi." },
            { german: ["Wie heißt dein Mathelehrer?"], french: "Comment s'appelle ton professeur de maths ?" },
            { german: ["Mein Lehrer ist sehr nett."], french: "Mon professeur est très gentil." },
            { german: ["Wann ist Pause?"], french: "Quand est la récréation ?" },
            { german: ["Wie viele Stunden hast du am Dienstag?"], french: "Combien d'heures as-tu le mardi ?" },
            { german: ["Wo ist der Biologieraum?"], french: "Où est la salle de biologie ?" },
            { german: ["Der Biologieraum ist im ersten Stock."], french: "La salle de biologie est au premier étage." },
            { german: ["Der Kunstraum ist im ersten Stock über der Bibliothek."], french: "La salle d'art est au premier étage, au-dessus de la bibliothèque." },
            { german: ["Die Turnhalle ist neben dem Pausenhof."], french: "La salle de sport est à côté de la cour de récréation." },
            { german: ["Die Schulkantine ist im Erdgeschoss."], french: "La cantine scolaire est au rez-de-chaussée." },
            { german: ["Das Sekretariat ist neben dem Lehrerzimmer."], french: "Le secrétariat est à côté de la salle des professeurs." },
            { german: ["Wer ist der Direktor? Der Direktor ist Herr Müller."], french: "Qui est le directeur ? Le directeur est M. Müller." },
            { german: ["Die Direktorin ist sehr freundlich."], french: "La directrice est très gentille." },
            { german: ["Der Hauswart repariert das Fenster."], french: "Le concierge répare la fenêtre." },
            { german: ["Die Sekretärin arbeitet im Büro."], french: "La secrétaire travaille dans le bureau." },
            { german: ["Mein Lehrer unterrichtet Deutsch."], french: "Mon professeur enseigne l'allemand." },
            { german: ["Die Köchin bereitet das Mittagessen vor."], french: "La cuisinière prépare le déjeuner." },
            { german: ["Darf ich auf die Toilette gehen?"], french: "Puis-je aller aux toilettes ?" },
            { german: ["Können Sie das bitte wiederholen?"], french: "Pouvez-vous répéter, s'il vous plaît ?" },
            { german: ["Ich verstehe das nicht."], french: "Je ne comprends pas." },
            { german: ["Was ist das?"], french: "Qu'est-ce que c'est ?" },
            { german: ["Wie sagt man das auf Deutsch?"], french: "Comment dit-on cela en allemand ?" },
            { german: ["Notiert das im Heft."], french: "Notez cela dans le cahier." },
            { german: ["Was machst du nach der Schule?"], french: "Que fais-tu après l'école ?" },
            { german: ["Ich mache meine Hausaufgaben."], french: "Je fais mes devoirs." },
        ];

        const container = document.getElementById('exercises');
        const scoreContainer = document.getElementById('score-container');
        const scoreFirstElem = document.getElementById('score-first');
        const scoreSecondElem = document.getElementById('score-second');
        const scoreThirdElem = document.getElementById('score-third');

        let scoreFirst = 0, scoreSecond = 0, scoreThird = 0;

        phrases.forEach((phrase, index) => {
            const words = phrase.german[0].replace('.', '').split(' ').sort(() => Math.random() - 0.5);
            let lastAnswer = '';
            let attempts = 0;

            const div = document.createElement('div');
            div.classList.add('phrase');
            div.innerHTML = `
               <p><strong>${index + 1})</strong> ${phrase.french}</p>
                <div class="words" id="words-${index}">
                    ${words.map(word => `<span class="word">${word}</span>`).join('')}
                </div>
                <div class="answer" id="answer-${index}"></div>
                <div class="btn-container">
                    <button class="btn-validate" id="validate-${index}" disabled>Valider</button>
                    <p id="feedback-${index}" class="feedback"></p>
                </div>
            `;
            container.appendChild(div);

            const validateBtn = document.getElementById(`validate-${index}`);
            const answerContainer = document.getElementById(`answer-${index}`);
            const feedback = document.getElementById(`feedback-${index}`);

            document.querySelectorAll(`#words-${index} .word`).forEach(wordElement => {
                wordElement.addEventListener('click', () => {
                    if (!wordElement.classList.contains('used')) {
                        const wordSpan = document.createElement('span');
                        wordSpan.textContent = wordElement.textContent;
                        wordSpan.onclick = () => {
                            answerContainer.removeChild(wordSpan);
                            wordElement.classList.remove('used');
                            toggleValidateButton();
                        };
                        answerContainer.appendChild(wordSpan);
                        wordElement.classList.add('used');
                        toggleValidateButton();
                    }
                });
            });

            function toggleValidateButton() {
                const currentAnswer = Array.from(answerContainer.children).map(span => span.textContent).join(' ').trim();
                const isComplete = answerContainer.children.length === words.length;
                validateBtn.disabled = !isComplete || currentAnswer === lastAnswer;
            }

            validateBtn.addEventListener('click', () => {
                const userAnswer = Array.from(answerContainer.children).map(span => span.textContent).join(' ').trim();
                const correctAnswer = phrase.german[0].replace('.', '').trim();
                attempts++;
                lastAnswer = userAnswer;

                if (userAnswer === correctAnswer) {
                    feedback.textContent = "Bonne réponse !";
                    feedback.className = "feedback correct";
                    validateBtn.disabled = true;
                    document.querySelector(`#words-${index}`).classList.add('disabled');
                    scoreByAttempts(attempts);
                } else {
                    feedback.textContent = `Faux ! Tentative ${attempts}/3. Essayez encore.`;
                    feedback.className = "feedback incorrect";
                    if (attempts >= 3) {
                        feedback.textContent = `Faux ! Réponse correcte : "${phrase.german[0]}". Vous pouvez réessayer.`;
                        attempts = 0;
                    }
                }
                toggleValidateButton();
            });
        });

        function scoreByAttempts(attempts) {
            if (attempts === 1) scoreFirst++;
            else if (attempts === 2) scoreSecond++;
            else if (attempts === 3) scoreThird++;

            if (scoreFirst + scoreSecond + scoreThird === phrases.length) {
                showScore();
            }
        }

        function showScore() {
            scoreFirstElem.textContent = scoreFirst;
            scoreSecondElem.textContent = scoreSecond;
            scoreThirdElem.textContent = scoreThird;
            scoreContainer.style.display = 'block';
        }
    </script>
</body>
</html>

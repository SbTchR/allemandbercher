<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phrases à bien connaître</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap');
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(145deg, rgba(255, 250, 229, 0.9), rgba(255, 250, 229, 0.9));
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .exercise-container {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        h1 {
            color: #FF8C00;
            text-align: center;
            margin-bottom: 20px;
        }
        .phrase {
            margin-bottom: 30px;
        }
        .phrase p {
            margin-bottom: 10px;
            font-size: 16px;
            color: #444;
        }
        .words {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .word {
            background: rgba(255, 165, 0, 0.4);
            color: black;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            user-select: none;
            border: 1px solid rgba(255, 165, 0, 0.7);
        }
        .word:hover {
            background: rgba(255, 165, 0, 0.7);
            transform: scale(1.1);
        }
        .word.used {
            background: #ddd;
            color: #999;
            cursor: not-allowed;
        }
        .answer {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
            min-height: 30px;
            border: 1px dashed #ccc;
            padding: 10px;
            background: rgba(240, 240, 240, 0.8);
            border-radius: 5px;
        }
        .btn-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }
        .btn-validate {
            padding: 10px 15px;
            background: #FFA500;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-validate:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .btn-validate:hover:not(:disabled) {
            background: #FF8C00;
        }
        .feedback {
            font-size: 14px;
            font-weight: bold;
            margin: 0;
        }
        .feedback.correct {
            color: green;
        }
        .feedback.incorrect {
            color: red;
        }
        .score {
            text-align: center;
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #444;
        }
    </style>
</head>
<body>
    <div class="exercise-container">
        <h1>Phrases à bien connaître</h1>
        <p>Remets les phrases dans le bon ordre en cliquant sur les mots. Tu as 3 tentatives par phrase.</p>

        <div id="exercises">
            <!-- Les phrases seront insérées ici dynamiquement -->
        </div>

        <div class="score" id="score-container" style="display: none;">
            <p>🏆Score final :</p>
            <p>🥇Réussies du premier coup : <span id="score-first">0</span></p>
            <p>🥈Réussies au deuxième coup : <span id="score-second">0</span></p>
            <p>🥉Réussies au troisième coup : <span id="score-third">0</span></p>
        </div>
    </div>

    <script>
        const phrases = [
            { german: ["Ich war in den Ferien am Meer."], french: "J'étais en vacances à la mer." },
            { german: ["Wir haben unsere Ferien in den Bergen verbracht."], french: "Nous avons passé nos vacances à la montagne." },
            { german: ["Wie waren deine Ferien? – Sie waren fantastisch!"], french: "Comment étaient tes vacances ? – Elles étaient fantastiques !" },
            { german: ["Ich war in Deutschland und habe meine Großeltern besucht."], french: "J'étais en Allemagne et j'ai rendu visite à mes grands-parents." },
            { german: ["Wir haben viele Ausflüge gemacht."], french: "Nous avons fait beaucoup d'excursions." },
            { german: ["In den Ferien war ich oft schwimmen."], french: "Pendant les vacances, je suis souvent allé nager." },
            { german: ["Das Wetter war sonnig und warm."], french: "Le temps était ensoleillé et chaud." },
            { german: ["Ich habe neue Freunde kennengelernt."], french: "J'ai rencontré de nouveaux amis." },
            { german: ["Wir haben jeden Tag lange Spaziergänge gemacht."], french: "Nous avons fait de longues promenades tous les jours." },
            { german: ["Ich war mit meiner Familie im Freizeitpark."], french: "J'étais avec ma famille au parc d'attractions." },
            { german: ["Ich habe viele Fotos gemacht und Erinnerungen gesammelt."], french: "J'ai pris beaucoup de photos et collecté des souvenirs." },
            { german: ["Mein Austauschpartner war sehr nett."], french: "Mon correspondant était très gentil." },
            { german: ["Bei der Ankunft hat mich meine Gastfamilie begrüßt."], french: "À mon arrivée, ma famille d'accueil m'a accueilli." },
            { german: ["Ich habe viel Deutsch gesprochen und mein Deutsch verbessert."], french: "J'ai beaucoup parlé allemand et j'ai amélioré mon allemand." },
            { german: ["Die Leute in der Schweiz waren sehr freundlich."], french: "Les gens en Suisse étaient très amicaux." },
            { german: ["Ich habe neue Gerichte ausprobiert."], french: "J'ai essayé de nouveaux plats." },
            { german: ["Wir haben eine Stadtbesichtigung in Bern gemacht."], french: "Nous avons fait une visite guidée de Berne." },
            { german: ["Die Ferien waren langweilig, weil ich zu Hause geblieben bin."], french: "Les vacances étaient ennuyeuses parce que je suis resté chez moi." },
            { german: ["Wie lange warst du weg? – Zwei Wochen."], french: "Combien de temps es-tu parti ? – Deux semaines." },
            { german: ["Am Anfang hatte ich ein bisschen Angst, aber dann war alles super."], french: "Au début, j'avais un peu peur, mais après tout était super." },
            { german: ["Ich habe viele interessante Erfahrungen gemacht."], french: "J'ai vécu beaucoup d'expériences intéressantes." },
            { german: ["Wir haben Schloss Neuschwanstein besucht."], french: "Nous avons visité le château de Neuschwanstein." },
            { german: ["Mein Austauschpartner hat mir seine Schule gezeigt."], french: "Mon correspondant m'a montré son école." },
            { german: ["Was hast du in den Ferien gemacht?"], french: "Qu'as-tu fait pendant les vacances ?" },
            { german: ["Ich habe Souvenirs für meine Freunde mitgebracht."], french: "J'ai ramené des souvenirs pour mes amis." },
            { german: ["Ich war auf der Insel Rab."], french: "J'étais sur l'île de Rab." },
            { german: ["Wir haben oft zusammen gekocht und gegrillt."], french: "Nous avons souvent cuisiné et fait des barbecues ensemble." },
            { german: ["Ich habe die deutsche Kultur kennengelernt."], french: "J'ai découvert la culture allemande." },
            { german: ["Ohne meine Eltern war es manchmal schwierig."], french: "Sans mes parents, c'était parfois difficile." },
            { german: ["Ich möchte nächstes Jahr wieder an einem Austausch teilnehmen."], french: "J'aimerais participer à un échange l'année prochaine." },
            
        ];

        const container = document.getElementById('exercises');
        const scoreContainer = document.getElementById('score-container');
        const scoreFirstElem = document.getElementById('score-first');
        const scoreSecondElem = document.getElementById('score-second');
        const scoreThirdElem = document.getElementById('score-third');

        let scoreFirst = 0, scoreSecond = 0, scoreThird = 0;

        phrases.forEach((phrase, index) => {
            const words = phrase.german[0].replace('.', '').split(' ').sort(() => Math.random() - 0.5);
            let lastAnswer = '';
            let attempts = 0;

            const div = document.createElement('div');
            div.classList.add('phrase');
            div.innerHTML = `
               <p><strong>${index + 1})</strong> ${phrase.french}</p>
                <div class="words" id="words-${index}">
                    ${words.map(word => `<span class="word">${word}</span>`).join('')}
                </div>
                <div class="answer" id="answer-${index}"></div>
                <div class="btn-container">
                    <button class="btn-validate" id="validate-${index}" disabled>Valider</button>
                    <p id="feedback-${index}" class="feedback"></p>
                </div>
            `;
            container.appendChild(div);

            const validateBtn = document.getElementById(`validate-${index}`);
            const answerContainer = document.getElementById(`answer-${index}`);
            const feedback = document.getElementById(`feedback-${index}`);

            document.querySelectorAll(`#words-${index} .word`).forEach(wordElement => {
                wordElement.addEventListener('click', () => {
                    if (!wordElement.classList.contains('used')) {
                        const wordSpan = document.createElement('span');
                        wordSpan.textContent = wordElement.textContent;
                        wordSpan.onclick = () => {
                            answerContainer.removeChild(wordSpan);
                            wordElement.classList.remove('used');
                            toggleValidateButton();
                        };
                        answerContainer.appendChild(wordSpan);
                        wordElement.classList.add('used');
                        toggleValidateButton();
                    }
                });
            });

            function toggleValidateButton() {
                const currentAnswer = Array.from(answerContainer.children).map(span => span.textContent).join(' ').trim();
                const isComplete = answerContainer.children.length === words.length;
                validateBtn.disabled = !isComplete || currentAnswer === lastAnswer;
            }

            validateBtn.addEventListener('click', () => {
                const userAnswer = Array.from(answerContainer.children).map(span => span.textContent).join(' ').trim();
                const correctAnswer = phrase.german[0].replace('.', '').trim();
                attempts++;
                lastAnswer = userAnswer;

                if (userAnswer === correctAnswer) {
                    feedback.textContent = "Bonne réponse !";
                    feedback.className = "feedback correct";
                    validateBtn.disabled = true;
                    document.querySelector(`#words-${index}`).classList.add('disabled');
                    scoreByAttempts(attempts);
                } else {
                    feedback.textContent = `Faux ! Tentative ${attempts}/3. Essayez encore.`;
                    feedback.className = "feedback incorrect";
                    if (attempts >= 3) {
                        feedback.textContent = `Faux ! Réponse correcte : "${phrase.german[0]}". Vous pouvez réessayer.`;
                        attempts = 0;
                    }
                }
                toggleValidateButton();
            });
        });

        function scoreByAttempts(attempts) {
            if (attempts === 1) scoreFirst++;
            else if (attempts === 2) scoreSecond++;
            else if (attempts === 3) scoreThird++;

            if (scoreFirst + scoreSecond + scoreThird === phrases.length) {
                showScore();
            }
        }

        function showScore() {
            scoreFirstElem.textContent = scoreFirst;
            scoreSecondElem.textContent = scoreSecond;
            scoreThirdElem.textContent = scoreThird;
            scoreContainer.style.display = 'block';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phrases à bien connaître</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap');
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(145deg, rgba(255, 250, 229, 0.9), rgba(255, 250, 229, 0.9));
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .exercise-container {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        h1 {
            color: #FF8C00;
            text-align: center;
            margin-bottom: 20px;
        }
        .phrase {
            margin-bottom: 30px;
        }
        .phrase p {
            margin-bottom: 10px;
            font-size: 16px;
            color: #444;
        }
        .words {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .word {
            background: rgba(255, 165, 0, 0.4);
            color: black;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            user-select: none;
            border: 1px solid rgba(255, 165, 0, 0.7);
        }
        .word:hover {
            background: rgba(255, 165, 0, 0.7);
            transform: scale(1.1);
        }
        .word.used {
            background: #ddd;
            color: #999;
            cursor: not-allowed;
        }
        .answer {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
            min-height: 30px;
            border: 1px dashed #ccc;
            padding: 10px;
            background: rgba(240, 240, 240, 0.8);
            border-radius: 5px;
        }
        .btn-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }
        .btn-validate {
            padding: 10px 15px;
            background: #FFA500;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-validate:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .btn-validate:hover:not(:disabled) {
            background: #FF8C00;
        }
        .feedback {
            font-size: 14px;
            font-weight: bold;
            margin: 0;
        }
        .feedback.correct {
            color: green;
        }
        .feedback.incorrect {
            color: red;
        }
        .score {
            text-align: center;
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #444;
        }
    </style>
</head>
<body>
    <div class="exercise-container">
        <h1>Phrases à bien connaître</h1>
        <p>Remets les phrases dans le bon ordre en cliquant sur les mots. Tu as 3 tentatives par phrase.</p>

        <div id="exercises">
            <!-- Les phrases seront insérées ici dynamiquement -->
        </div>

        <div class="score" id="score-container" style="display: none;">
            <p>🏆Score final :</p>
            <p>🥇Réussies du premier coup : <span id="score-first">0</span></p>
            <p>🥈Réussies au deuxième coup : <span id="score-second">0</span></p>
            <p>🥉Réussies au troisième coup : <span id="score-third">0</span></p>
        </div>
    </div>

    <script>
        const phrases = [
            { german: ["Hast du viele Freunde?"], french: "As-tu beaucoup d'amis ?" },
            { german: ["Ja, ich habe eine beste Freundin und viele Freunde."], french: "Oui, j'ai une meilleure amie et beaucoup d'amis." },
            { german: ["Mein bester Freund heißt Jonas."], french: "Mon meilleur ami s'appelle Jonas." },
            { german: ["Wie ist deine beste Freundin?"], french: "Comment est ta meilleure amie ?" },
            { german: ["Sie ist lustig und sehr nett."], french: "Elle est drôle et très gentille." },
            { german: ["Was macht ihr zusammen?"], french: "Que faites-vous ensemble ?" },
            { german: ["Wir gehen oft ins Kino oder machen Sport."], french: "Nous allons souvent au cinéma ou faisons du sport." },
            { german: ["Ich kenne meinen Freund seit der Grundschule."], french: "Je connais mon ami depuis l'école primaire." },
            { german: ["Wie hast du deinen Freund kennengelernt?"], french: "Comment as-tu rencontré ton ami ?" },
            { german: ["Wir haben uns im Fußballverein kennengelernt."], french: "Nous nous sommes rencontrés au club de football." },
            { german: ["Was ist dir wichtig bei einem Freund?"], french: "Qu'est-ce qui est important pour toi chez un ami ?" },
            { german: ["Ehrlichkeit und Vertrauen sind mir wichtig."], french: "L'honnêteté et la confiance sont importantes pour moi." },
            { german: ["Was machst du, wenn du Streit mit einem Freund hast?"], french: "Que fais-tu quand tu te disputes avec un ami ?" },
            { german: ["Ich spreche mit ihm und wir lösen das Problem."], french: "Je parle avec lui et nous réglons le problème." },
            { german: ["Wir machen oft Witze zusammen."], french: "Nous faisons souvent des blagues ensemble." },
            { german: ["Wann triffst du deine Freunde?"], french: "Quand rencontres-tu tes amis ?" },
            { german: ["Ich treffe sie am Wochenende."], french: "Je les vois le week-end." },
            { german: ["Was ist ein guter Freund für dich?"], french: "Qu'est-ce qu'un bon ami pour toi ?" },
            { german: ["Ein guter Freund hilft mir und hört mir zu."], french: "Un bon ami m'aide et m'écoute." },
            { german: ["Hast du auch Freunde im Ausland?"], french: "As-tu aussi des amis à l'étranger ?" },
            { german: ["Ja, ich habe einen Freund in Frankreich."], french: "Oui, j'ai un ami en France." },
            { german: ["Wir schreiben uns E-Mails und telefonieren oft."], french: "Nous nous écrivons des e-mails et nous appelons souvent." },
            { german: ["Mein Freund hat immer Zeit für mich."], french: "Mon ami a toujours du temps pour moi." },
            { german: ["Wir feiern oft Geburtstage zusammen."], french: "Nous fêtons souvent des anniversaires ensemble." },
            { german: ["Was machst du, wenn ein Freund traurig ist?"], french: "Que fais-tu quand un ami est triste ?" },
            { german: ["Ich tröste ihn und mache ihm Mut."], french: "Je le console et l'encourage." },
            { german: ["Freunde sind wie eine zweite Familie."], french: "Les amis sont comme une deuxième famille." },
            { german: ["Wir haben einen gemeinsamen Freundeskreis."], french: "Nous avons un cercle d'amis commun." },
            { german: ["Wie findest du neue Freunde?"], french: "Comment trouves-tu de nouveaux amis ?" },
            { german: ["Ich finde neue Freunde über meine Hobbys."], french: "Je trouve de nouveaux amis grâce à mes passe-temps." },
            { german: ["Kannst du deinem besten Freund alles erzählen?"], french: "Peux-tu tout raconter à ton meilleur ami ?" },
            { german: ["Ja, ich vertraue ihm komplett."], french: "Oui, je lui fais totalement confiance." },
            { german: ["Freunde zu haben macht das Leben schöner."], french: "Avoir des amis rend la vie plus belle." },
            
        ];

        const container = document.getElementById('exercises');
        const scoreContainer = document.getElementById('score-container');
        const scoreFirstElem = document.getElementById('score-first');
        const scoreSecondElem = document.getElementById('score-second');
        const scoreThirdElem = document.getElementById('score-third');

        let scoreFirst = 0, scoreSecond = 0, scoreThird = 0;

        phrases.forEach((phrase, index) => {
            const words = phrase.german[0].replace('.', '').split(' ').sort(() => Math.random() - 0.5);
            let lastAnswer = '';
            let attempts = 0;

            const div = document.createElement('div');
            div.classList.add('phrase');
            div.innerHTML = `
               <p><strong>${index + 1})</strong> ${phrase.french}</p>
                <div class="words" id="words-${index}">
                    ${words.map(word => `<span class="word">${word}</span>`).join('')}
                </div>
                <div class="answer" id="answer-${index}"></div>
                <div class="btn-container">
                    <button class="btn-validate" id="validate-${index}" disabled>Valider</button>
                    <p id="feedback-${index}" class="feedback"></p>
                </div>
            `;
            container.appendChild(div);

            const validateBtn = document.getElementById(`validate-${index}`);
            const answerContainer = document.getElementById(`answer-${index}`);
            const feedback = document.getElementById(`feedback-${index}`);

            document.querySelectorAll(`#words-${index} .word`).forEach(wordElement => {
                wordElement.addEventListener('click', () => {
                    if (!wordElement.classList.contains('used')) {
                        const wordSpan = document.createElement('span');
                        wordSpan.textContent = wordElement.textContent;
                        wordSpan.onclick = () => {
                            answerContainer.removeChild(wordSpan);
                            wordElement.classList.remove('used');
                            toggleValidateButton();
                        };
                        answerContainer.appendChild(wordSpan);
                        wordElement.classList.add('used');
                        toggleValidateButton();
                    }
                });
            });

            function toggleValidateButton() {
                const currentAnswer = Array.from(answerContainer.children).map(span => span.textContent).join(' ').trim();
                const isComplete = answerContainer.children.length === words.length;
                validateBtn.disabled = !isComplete || currentAnswer === lastAnswer;
            }

            validateBtn.addEventListener('click', () => {
                const userAnswer = Array.from(answerContainer.children).map(span => span.textContent).join(' ').trim();
                const correctAnswer = phrase.german[0].replace('.', '').trim();
                attempts++;
                lastAnswer = userAnswer;

                if (userAnswer === correctAnswer) {
                    feedback.textContent = "Bonne réponse !";
                    feedback.className = "feedback correct";
                    validateBtn.disabled = true;
                    document.querySelector(`#words-${index}`).classList.add('disabled');
                    scoreByAttempts(attempts);
                } else {
                    feedback.textContent = `Faux ! Tentative ${attempts}/3. Essayez encore.`;
                    feedback.className = "feedback incorrect";
                    if (attempts >= 3) {
                        feedback.textContent = `Faux ! Réponse correcte : "${phrase.german[0]}". Vous pouvez réessayer.`;
                        attempts = 0;
                    }
                }
                toggleValidateButton();
            });
        });

        function scoreByAttempts(attempts) {
            if (attempts === 1) scoreFirst++;
            else if (attempts === 2) scoreSecond++;
            else if (attempts === 3) scoreThird++;

            if (scoreFirst + scoreSecond + scoreThird === phrases.length) {
                showScore();
            }
        }

        function showScore() {
            scoreFirstElem.textContent = scoreFirst;
            scoreSecondElem.textContent = scoreSecond;
            scoreThirdElem.textContent = scoreThird;
            scoreContainer.style.display = 'block';
        }
    </script>
</body>
</html>

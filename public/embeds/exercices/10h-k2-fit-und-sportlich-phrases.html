<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phrases à bien connaître</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap');
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(145deg, rgba(255, 250, 229, 0.9), rgba(255, 250, 229, 0.9));
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .exercise-container {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        h1 {
            color: #FF8C00;
            text-align: center;
            margin-bottom: 20px;
        }
        .phrase {
            margin-bottom: 30px;
        }
        .phrase p {
            margin-bottom: 10px;
            font-size: 16px;
            color: #444;
        }
        .words {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .word {
            background: rgba(255, 165, 0, 0.4);
            color: black;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            user-select: none;
            border: 1px solid rgba(255, 165, 0, 0.7);
        }
        .word:hover {
            background: rgba(255, 165, 0, 0.7);
            transform: scale(1.1);
        }
        .word.used {
            background: #ddd;
            color: #999;
            cursor: not-allowed;
        }
        .answer {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
            min-height: 30px;
            border: 1px dashed #ccc;
            padding: 10px;
            background: rgba(240, 240, 240, 0.8);
            border-radius: 5px;
        }
        .btn-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }
        .btn-validate {
            padding: 10px 15px;
            background: #FFA500;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-validate:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .btn-validate:hover:not(:disabled) {
            background: #FF8C00;
        }
        .feedback {
            font-size: 14px;
            font-weight: bold;
            margin: 0;
        }
        .feedback.correct {
            color: green;
        }
        .feedback.incorrect {
            color: red;
        }
        .score {
            text-align: center;
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #444;
        }
    </style>
</head>
<body>
    <div class="exercise-container">
        <h1>Phrases à bien connaître</h1>
        <p>Remets les phrases dans le bon ordre en cliquant sur les mots. Tu as 3 tentatives par phrase.</p>

        <div id="exercises">
            <!-- Les phrases seront insérées ici dynamiquement -->
        </div>

        <div class="score" id="score-container" style="display: none;">
            <p>🏆Score final :</p>
            <p>🥇Réussies du premier coup : <span id="score-first">0</span></p>
            <p>🥈Réussies au deuxième coup : <span id="score-second">0</span></p>
            <p>🥉Réussies au troisième coup : <span id="score-third">0</span></p>
        </div>
    </div>

    <script>
        const phrases = [
            { german: ["ch spiele Volleyball, weil es Spaß macht."], french: "Je joue au volleyball parce que c'est amusant." },
            { german: ["Mein Lieblingssport ist Schwimmen, weil man fit bleibt."], french: "Mon sport préféré est la natation parce qu'on reste en forme." },
            { german: ["Zum Fußballspielen braucht man einen Ball, Schuhe und ein Trikot."], french: "Pour jouer au football, on a besoin d'un ballon, de chaussures et d'un maillot." },
            { german: ["Ich trainiere zweimal pro Woche in der Halle."], french: "Je m'entraîne deux fois par semaine en salle." },
            { german: ["Ich mache keinen Sport, weil ich keine Zeit habe."], french: "Je ne fais pas de sport parce que je n'ai pas le temps." },
            { german: ["Basketball ist spannender als Volleyball."], french: "Le basketball est plus passionnant que le volleyball." },
            { german: ["Mein Bruder läuft schneller als ich."], french: "Mon frère court plus vite que moi." },
            { german: ["Ich trainiere gerne mit meinem Team."], french: "J'aime m'entraîner avec mon équipe." },
            { german: ["Fürs Joggen braucht man nur gute Turnschuhe."], french: "Pour courir, on a seulement besoin de bonnes baskets." },
            { german: ["Ich finde Eishockey aufregend, aber anstrengend."], french: "Je trouve le hockey sur glace passionnant mais fatigant." },
            { german: ["Ich mag Sport, weil man neue Leute kennenlernt."], french: "J'aime le sport parce qu'on rencontre de nouvelles personnes." },
            { german: ["Klettern macht Spaß, aber es ist auch gefährlich."], french: "L'escalade est amusante mais aussi dangereuse." },
            { german: ["Ich mache oft Sport, um abzuschalten."], french: "Je fais souvent du sport pour me détendre." },
            { german: ["Was brauchst du für deinen Sport?"], french: "De quoi as-tu besoin pour ton sport ?" },
            { german: ["Ich brauche einen Schläger und ein Netz, um Tennis zu spielen."], french: "J'ai besoin d'une raquette et d'un filet pour jouer au tennis." },
            { german: ["Volleyball spielt man im Team."], french: "On joue au volleyball en équipe." },
            { german: ["Ich finde, dass Badminton einfacher ist als Tischtennis."], french: "Je trouve que le badminton est plus facile que le tennis de table." },
            { german: ["Ich mag keinen Sport, weil er zu anstrengend ist."], french: "Je n'aime pas le sport parce que c'est trop fatigant." },
            { german: ["Im Sommer trainiere ich draußen, im Winter in der Halle."], french: "En été, je m'entraîne dehors, en hiver en salle." },
            { german: ["Ich mag Skateboardfahren, weil es cool aussieht."], french: "J'aime faire du skateboard parce que ça a l'air cool." },
            { german: ["Welche Sportarten magst du?"], french: "Quels sports aimes-tu ?" },
            { german: ["Ich finde, dass Schwimmen besser für die Gesundheit ist."], french: "Je trouve que la natation est meilleure pour la santé." },
            { german: ["Man braucht einen Helm und Schlittschuhe für Eishockey."], french: "On a besoin d'un casque et de patins pour le hockey sur glace." },
            { german: ["Ich bin sportlich und mache gerne Judo."], french: "Je suis sportif et j'aime faire du judo." },
            { german: ["Ich finde, dass Sport mich glücklich macht."], french: "Je trouve que le sport me rend heureux." },
            { german: ["Mein Vater segelt gern, weil er das Wasser liebt."], french: "Mon père aime faire de la voile parce qu'il adore l'eau." },
            { german: ["Wie oft trainierst du in der Woche?"], french: "Combien de fois t'entraînes-tu par semaine ?" },
            { german: ["Ich spiele Basketball, weil ich mich gerne bewege."], french: "Je joue au basketball parce que j'aime bouger." },
            { german: ["Klettern ist anstrengender als Joggen."], french: "L'escalade est plus fatigante que le jogging." },
            { german: ["Ich mache Sport, um gesund zu bleiben."], french: "Je fais du sport pour rester en bonne santé." },
            
        ];

        const container = document.getElementById('exercises');
        const scoreContainer = document.getElementById('score-container');
        const scoreFirstElem = document.getElementById('score-first');
        const scoreSecondElem = document.getElementById('score-second');
        const scoreThirdElem = document.getElementById('score-third');

        let scoreFirst = 0, scoreSecond = 0, scoreThird = 0;

        phrases.forEach((phrase, index) => {
            const words = phrase.german[0].replace('.', '').split(' ').sort(() => Math.random() - 0.5);
            let lastAnswer = '';
            let attempts = 0;

            const div = document.createElement('div');
            div.classList.add('phrase');
            div.innerHTML = `
               <p><strong>${index + 1})</strong> ${phrase.french}</p>
                <div class="words" id="words-${index}">
                    ${words.map(word => `<span class="word">${word}</span>`).join('')}
                </div>
                <div class="answer" id="answer-${index}"></div>
                <div class="btn-container">
                    <button class="btn-validate" id="validate-${index}" disabled>Valider</button>
                    <p id="feedback-${index}" class="feedback"></p>
                </div>
            `;
            container.appendChild(div);

            const validateBtn = document.getElementById(`validate-${index}`);
            const answerContainer = document.getElementById(`answer-${index}`);
            const feedback = document.getElementById(`feedback-${index}`);

            document.querySelectorAll(`#words-${index} .word`).forEach(wordElement => {
                wordElement.addEventListener('click', () => {
                    if (!wordElement.classList.contains('used')) {
                        const wordSpan = document.createElement('span');
                        wordSpan.textContent = wordElement.textContent;
                        wordSpan.onclick = () => {
                            answerContainer.removeChild(wordSpan);
                            wordElement.classList.remove('used');
                            toggleValidateButton();
                        };
                        answerContainer.appendChild(wordSpan);
                        wordElement.classList.add('used');
                        toggleValidateButton();
                    }
                });
            });

            function toggleValidateButton() {
                const currentAnswer = Array.from(answerContainer.children).map(span => span.textContent).join(' ').trim();
                const isComplete = answerContainer.children.length === words.length;
                validateBtn.disabled = !isComplete || currentAnswer === lastAnswer;
            }

            validateBtn.addEventListener('click', () => {
                const userAnswer = Array.from(answerContainer.children).map(span => span.textContent).join(' ').trim();
                const correctAnswer = phrase.german[0].replace('.', '').trim();
                attempts++;
                lastAnswer = userAnswer;

                if (userAnswer === correctAnswer) {
                    feedback.textContent = "Bonne réponse !";
                    feedback.className = "feedback correct";
                    validateBtn.disabled = true;
                    document.querySelector(`#words-${index}`).classList.add('disabled');
                    scoreByAttempts(attempts);
                } else {
                    feedback.textContent = `Faux ! Tentative ${attempts}/3. Essayez encore.`;
                    feedback.className = "feedback incorrect";
                    if (attempts >= 3) {
                        feedback.textContent = `Faux ! Réponse correcte : "${phrase.german[0]}". Vous pouvez réessayer.`;
                        attempts = 0;
                    }
                }
                toggleValidateButton();
            });
        });

        function scoreByAttempts(attempts) {
            if (attempts === 1) scoreFirst++;
            else if (attempts === 2) scoreSecond++;
            else if (attempts === 3) scoreThird++;

            if (scoreFirst + scoreSecond + scoreThird === phrases.length) {
                showScore();
            }
        }

        function showScore() {
            scoreFirstElem.textContent = scoreFirst;
            scoreSecondElem.textContent = scoreSecond;
            scoreThirdElem.textContent = scoreThird;
            scoreContainer.style.display = 'block';
        }
    </script>
</body>
</html>
